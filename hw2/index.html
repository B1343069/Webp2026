<meta charset="UTF-8">
<title>資工選課表</title>
<style>
table {
  font-family: Arial, Helvetica, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #ddd;
  padding: 6px;
}

tr:nth-child(even){background-color: #f2f2f2;}

tr:hover {background-color: #ddd;}

th {
  padding-top: 12px;
  padding-bottom: 12px;
  text-align: left;
  background-color: #04AA6D;
  color: white;
}
</style>
</head>

<script>
  function changeTeacher() {
    // 1. 找到 id 為 teacher-name 的元素
    const teacherCell = document.getElementById('teachername');
    
    // 2. 修改它的內容
    teacherCell.innerText = "李春良";
    
    // 3. (加分題) 順便改個顏色讓效果更明顯
    teacherCell.style.color = "red";
    teacherCell.style.fontWeight = "bold";
  }
</script>
