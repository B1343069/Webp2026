<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>景點觀光展覽資訊 - Ajax example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background-color: #f6f7f8;
            color: #333;
        }
        h1 {
            margin-bottom: 12px;
            font-size: 2rem;
        }
        button {
            padding: 10px 18px;
            font-size: 16px;
            background-color: #10904c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .description {
            margin: 8px 0 20px;
            color: #555;
        }
        .table-container {
            overflow-x: auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        thead {
            background-color: #10904c;
            color: white;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e6e6e6;
        }
        tbody tr:nth-child(odd) {
            background-color: #fafafa;
        }
        tbody tr:hover {
            background-color: #f1fff0;
        }
        .status {
            margin-top: 16px;
            font-size: 0.95rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>景點觀光展覽資訊</h1>
    <p class="description">點選按鈕後，從文化部開放資料通知取得最新展覽資訊。</p>
    <button id="loadButton">載入 API 資料</button>
    <div id="result" class="table-container"></div>
    <div id="status" class="status"></div>

    <script src="script.js"></script>
</body>
</html>
